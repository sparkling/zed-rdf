id = "zed-rdf"
name = "RDF / SPARQL / ShEx / Datalog"
description = "Syntax highlighting and LSP support for RDF, SPARQL, ShEx, and Datalog."
version = "0.1.0"
schema_version = 1
authors = ["Henrik Pettersen <henrik@sparklingideas.co.uk>"]
repository = "https://github.com/sparkling/zed-rdf"

[language_servers.rdf-lsp]
name = "rdf-lsp"
languages = [
    "N-Triples",
    "N-Quads",
    "Turtle",
    "TriG",
    "RDF/XML",
    "JSON-LD",
    "TriX",
    "N3",
    "SPARQL",
    "ShEx",
    "Datalog",
]

# Tree-sitter grammars. ShEx, N3, Datalog, TriX, RDF/XML, and JSON-LD
# have no dedicated grammar here — they rely on LSP semantic tokens
# (and Zed's built-in xml/json grammars where applicable) for
# highlighting.

[grammars.turtle]
repository = "https://github.com/GordianDziwis/tree-sitter-turtle"
commit = "7f789ea7ef765080f71a298fc96b7c957fa24422"

[grammars.sparql]
repository = "https://github.com/GordianDziwis/tree-sitter-sparql"
commit = "1ef52d35a73a2a5f2e433ecfd1c751c1360a923b"

# N-Triples, N-Quads, TriG, and N3 all share the `turtle` grammar. They
# are syntactic subsets / supersets of Turtle, and the `turtle` node
# vocabulary covers all four. Zed matches grammar name to exported
# symbol (`tree_sitter_turtle`), so we reference it by the same name
# from each language's config.toml rather than declaring an alias.
