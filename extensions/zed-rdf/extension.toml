id = "zed-rdf"
name = "RDF / SPARQL / ShEx / Datalog"
description = "Syntax highlighting and LSP support for RDF, SPARQL, ShEx, and Datalog."
version = "0.1.0"
schema_version = 1
authors = ["Henrik Pettersen <henrik@sparklingideas.co.uk>"]
repository = "https://github.com/sparkling/zed-rdf"
category = "Languages"

[lib]
kind = "WebAssemblyExtension"

[language_servers.rdf-lsp]
name = "rdf-lsp"
language = ["N-Triples", "N-Quads", "Turtle", "TriG", "RDF/XML", "JSON-LD", "TriX", "N3", "SPARQL", "ShEx", "Datalog"]

# Tree-sitter grammars. Only publicly-available grammars are listed;
# ShEx, N3, Datalog, TriX, RDF/XML, and JSON-LD rely on LSP semantic
# tokens (and Zed's built-in xml/json grammars where applicable) for
# highlighting.

[[grammars]]
name = "turtle"
repository = "https://github.com/GordianDziwis/tree-sitter-turtle"
commit = "7f789ea7ef765080f71a298fc96b7c957fa24422"

[[grammars]]
name = "sparql"
repository = "https://github.com/GordianDziwis/tree-sitter-sparql"
commit = "1ef52d35a73a2a5f2e433ecfd1c751c1360a923b"

# N-Triples / N-Quads reuse the Turtle grammar — NT/NQ are syntactic
# subsets of Turtle/TriG, and GordianDziwis/tree-sitter-turtle's node
# vocabulary covers both forms cleanly.
[[grammars]]
name = "ntriples"
repository = "https://github.com/GordianDziwis/tree-sitter-turtle"
commit = "7f789ea7ef765080f71a298fc96b7c957fa24422"
