# cargo-deny configuration enforcing ADR-0004 (third-party crate policy)
# and parts of ADR-0001 (licensing).

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.92

[bans]
# Fail if the same crate appears at multiple versions in the dependency
# graph, so we catch duplication early.
multiple-versions = "warn"
wildcards = "deny"

# Per ADR-0004, we do not depend on any other RDF/SPARQL parser or
# triplestore crate. Adding any of these indicates a violation of
# "no forking".
deny = [
    { name = "oxrdf" },
    { name = "oxttl" },
    { name = "oxrdfio" },
    { name = "oxsparql-syntax" },
    { name = "oxigraph" },
    { name = "oxjsonld" },
    { name = "oxrdfxml" },
    { name = "sophia" },
    { name = "sophia_api" },
    { name = "sophia_iri" },
    { name = "sophia_turtle" },
    { name = "sophia_xml" },
    { name = "sophia_jsonld" },
    { name = "rio_turtle" },
    { name = "rio_xml" },
    { name = "rio_api" },
    { name = "rdftk_core" },
    { name = "rdftk_io" },
    { name = "horned-owl" },
]

[advisories]
version = 2
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
